name: Windows Installer

'on':
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: windows-installer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows-installer:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        shell: pwsh
        run: |
          npm run build
          npx electron-builder --win dir --x64 --publish never -c.npmRebuild=false -c.win.signAndEditExecutable=false -c.forceCodeSigning=false
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Falha ao gerar instalador Windows no CI."
            exit $LASTEXITCODE
          }
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          USE_HARD_LINKS: 'false'

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ github.sha }}
          path: |
            release-electron/win-unpacked/PDVTouch Restaurante.exe
            release-electron/win-unpacked/resources/**
            release-electron/win-unpacked/locales/**
            release-electron/win-unpacked/*.dll
            release-electron/win-unpacked/*.pak
            release-electron/win-unpacked/*.bin
            release-electron/win-unpacked/*.json
            release-electron/win-unpacked/version
          if-no-files-found: error
          retention-days: 7
