name: Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: windows-installer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows-installer:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        shell: pwsh
        run: |
          npm run electron:pack
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Primeira tentativa falhou. Reexecutando com fallback de CI..."
            npx electron-builder --win --x64 -c.npmRebuild=false -c.win.signAndEditExecutable=false -c.forceCodeSigning=false
          }
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Falha ao gerar instalador Windows no CI."
            exit $LASTEXITCODE
          }
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ github.sha }}
          path: |
            release-electron/*.exe
            release-electron/*.blockmap
            release-electron/latest.yml
          if-no-files-found: error
          retention-days: 7
