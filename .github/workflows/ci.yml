name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --run

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (dist-mode)
        run: npm run build -- --base ./

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdv-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  windows-installer:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        shell: pwsh
        run: |
          npm run build
          npx electron-builder --win dir --x64 --publish never -c.npmRebuild=false -c.win.signAndEditExecutable=false -c.forceCodeSigning=false
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Falha ao gerar instalador Windows no CI."
            exit $LASTEXITCODE
          }
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          USE_HARD_LINKS: 'false'

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ github.sha }}
          path: |
            release-electron/win-unpacked/PDVTouch Restaurante.exe
            release-electron/win-unpacked/resources/**
            release-electron/win-unpacked/locales/**
            release-electron/win-unpacked/*.dll
            release-electron/win-unpacked/*.pak
            release-electron/win-unpacked/*.bin
            release-electron/win-unpacked/*.json
            release-electron/win-unpacked/version
          if-no-files-found: error
          retention-days: 7
